<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#2c5f8a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Pattern dots -->
  <circle cx="100" cy="100" r="3" fill="white" opacity="0.07"/>
  <circle cx="300" cy="50" r="3" fill="white" opacity="0.07"/>
  <circle cx="500" cy="120" r="3" fill="white" opacity="0.07"/>
  <circle cx="700" cy="60" r="3" fill="white" opacity="0.07"/>
  <circle cx="900" cy="100" r="3" fill="white" opacity="0.07"/>
  <circle cx="1100" cy="50" r="3" fill="white" opacity="0.07"/>
  <!-- Badge -->
  <rect x="80" y="100" width="260" height="40" rx="20" fill="rgba(232,160,32,0.2)" stroke="#e8a020" stroke-width="1"/>
  <text x="210" y="126" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#e8a020">🏇 AI競馬予測 · 毎週無料公開</text>
  <!-- Main title -->
  <text x="80" y="230" font-family="sans-serif" font-size="72" font-weight="bold" fill="white">DarkHorse AI</text>
  <!-- Subtitle -->
  <text x="80" y="300" font-family="sans-serif" font-size="32" fill="rgba(255,255,255,0.85)">三連複万馬券が出やすいレースをAIが毎週予測</text>
  <!-- Stats -->
  <rect x="80" y="360" width="280" height="100" rx="10" fill="rgba(255,255,255,0.08)"/>
  <text x="220" y="400" text-anchor="middle" font-family="sans-serif" font-size="44" font-weight="bold" fill="#e8a020">2,900+</text>
  <text x="220" y="438" text-anchor="middle" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,0.7)">分析レース数</text>

  <rect x="400" y="360" width="280" height="100" rx="10" fill="rgba(255,255,255,0.08)"/>
  <text x="540" y="400" text-anchor="middle" font-family="sans-serif" font-size="44" font-weight="bold" fill="#e8a020">0.765</text>
  <text x="540" y="438" text-anchor="middle" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,0.7)">モデル精度 AUC</text>

  <rect x="720" y="360" width="280" height="100" rx="10" fill="rgba(255,255,255,0.08)"/>
  <text x="860" y="400" text-anchor="middle" font-family="sans-serif" font-size="44" font-weight="bold" fill="#e8a020">無料</text>
  <text x="860" y="438" text-anchor="middle" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,0.7)">登録不要</text>
  <!-- URL -->
  <text x="80" y="560" font-family="sans-serif" font-size="22" fill="rgba(255,255,255,0.5)">msalpha0123-source.github.io/darkhorse-site</text>
  <!-- Accent line -->
  <rect x="0" y="610" width="1200" height="20" fill="#e8a020"/>
</svg>
